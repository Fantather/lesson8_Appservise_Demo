{% for product in products %}
    <div>
        <h3>{{ product.name }}</h3>
        <p>Категория: {{ product.category.name }}</p>
        
        {% if product.image %}
            <img src="{{ product.image.url }}" alt="{{ product.name }}" width="200">
        {% else %}
            <p>Нет изображения</p>
        {% endif %}
    </div>
{% endfor %}
